<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>黛溪的照片墙</title>

    <!-- ===== 字体 ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />

    <!-- ===== Swiper CSS ===== -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #fcf8f6;
            min-height: 100vh;
            padding: 2rem 1.5rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gallery-wrapper {
            max-width: 1200px;
            width: 100%;
        }

        /* ===== 标题 ===== */
        .gallery-header {
            text-align: center;
            margin-bottom: 2.8rem;
        }

        .gallery-header h1 {
            font-size: 2.6rem;
            font-weight: 400;
            color: #3d2c2a;
        }

        .gallery-header .subtitle {
            font-size: 1.1rem;
            color: #8a7773;
            margin-top: 0.3rem;
        }

        .gallery-header .subtitle .heart {
            color: #e0786a;
            display: inline-block;
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }

        .gallery-header .hint {
            margin-top: 0.8rem;
            font-size: 0.9rem;
            color: #b5a39e;
        }

        /* ===== 网格 ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.2rem;
            justify-content: center;
        }

        .grid-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            background: #fff;
            cursor: pointer;
            aspect-ratio: 4 / 5;
            transition: transform 0.25s, box-shadow 0.3s;
        }

        .grid-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.08);
        }

        /* 图片与视频层叠 */
        .grid-item .media-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .grid-item .media-wrapper img,
        .grid-item .media-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .grid-item .media-wrapper video {
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .grid-item .media-wrapper video.active {
            opacity: 1;
        }

        /* ===== 灯箱 (Swiper) ===== */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 22, 20, 0.85);
            backdrop-filter: blur(12px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            padding: 1.5rem;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .swiper-container {
            width: 100%;
            max-width: 90vw;
            max-height: 80vh;
            height: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            background: #1a1a1a;
        }

        .swiper-slide {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
        }

        .swiper-slide img,
        .swiper-slide video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
        }

        .swiper-slide video {
            background: #000;
        }

        /* 自定义导航 */
        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
            z-index: 10001;
            transition: background 0.25s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .nav-btn.prev {
            left: 1.5rem;
        }

        .nav-btn.next {
            right: 1.5rem;
        }

        .nav-btn.swiper-button-disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .close-btn {
            position: fixed;
            top: 1.8rem;
            right: 2rem;
            z-index: 10002;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            border: none;
            border-radius: 60px;
            width: 50px;
            height: 50px;
            font-size: 1.8rem;
            color: #fff;
            cursor: pointer;
            transition: background 0.25s;
        }

        .close-btn:hover {
            background: rgba(0, 0, 0, 0.55);
        }

        .counter {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(6px);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10001;
            font-size: 0.95rem;
        }

        /* ===== 返回按钮 ===== */
        .back-home {
            margin-top: 3rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #f2cdc4;
            color: #3d2c2a;
            padding: 0.75rem 2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.25s, transform 0.2s;
            box-shadow: 0 4px 12px rgba(242, 205, 196, 0.3);
        }

        .back-home:hover {
            background: #e8bcb2;
            transform: translateY(-2px);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            body {
                padding: 1.2rem 0.8rem 2rem;
            }

            .gallery-header h1 {
                font-size: 1.9rem;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 0.8rem;
            }

            .nav-btn {
                width: 44px;
                height: 44px;
                font-size: 1.4rem;
            }

            .nav-btn.prev {
                left: 0.6rem;
            }

            .nav-btn.next {
                right: 0.6rem;
            }

            .close-btn {
                top: 1rem;
                right: 1rem;
                width: 44px;
                height: 44px;
                font-size: 1.5rem;
            }

            .counter {
                bottom: 1.5rem;
                font-size: 0.8rem;
                padding: 0.3rem 1rem;
            }
        }

        @media (max-width: 400px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 0.6rem;
            }
        }
    </style>
</head>

<body>

    <div class="gallery-wrapper">
        <header class="gallery-header">
            <h1>#黛机时刻</h1>
            <p class="subtitle">​​Daisy’s Photo Gallery​ <span class="heart">❤️</span></p>
            <p class="hint">点击任意照片放大 · 左右滑动浏览</p>
        </header>

        <div class="grid" id="photoGrid"></div>

        <div style="display: flex; justify-content: center; width: 100%;">
            <a href="https://zdx-role-test.ycxazzo.top" target="_blank" class="back-home">
                ← 回到人格测试
            </a>
        </div>
    </div>

    <!-- ===== 灯箱 ===== -->
    <div class="lightbox" id="lightbox">
        <button class="close-btn" id="closeBtn">✕</button>
        <button class="nav-btn prev" id="prevBtn">‹</button>
        <button class="nav-btn next" id="nextBtn">›</button>

        <div class="swiper-container" id="swiperContainer">
            <div class="swiper-wrapper" id="swiperWrapper"></div>
        </div>

        <div class="counter" id="counter">1 / 1</div>
    </div>

    <!-- ===== 引入 Swiper ===== -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        (function() {
            'use strict';

            // ============================================================
            // 1. DOM 引用
            // ============================================================
            const grid = document.getElementById('photoGrid');
            const lightbox = document.getElementById('lightbox');
            const closeBtn = document.getElementById('closeBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const counter = document.getElementById('counter');
            const swiperWrapper = document.getElementById('swiperWrapper');
            const swiperContainer = document.getElementById('swiperContainer');

            let swiperInstance = null;
            let currentIndex = 0;
            let IMAGES = []; // 将从 data.json 加载

            // ============================================================
            // 2. 加载 data.json
            // ============================================================
            async function loadImages() {
                try {
                    const response = await fetch('data.json');
                    if (!response.ok) throw new Error('data.json 加载失败');
                    const data = await response.json();
                    IMAGES = data;
                    if (!IMAGES.length) {
                        grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#8a7773; padding:3rem 0;">暂无照片，请添加图片。</p>';
                        return;
                    }
                    renderGrid();
                    console.log('📸 照片墙已加载，图片数量:', IMAGES.length);
                } catch (error) {
                    console.error('加载图片数据失败:', error);
                    grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#e0786a; padding:3rem 0;">⚠️ 数据加载失败，请检查部署。</p>';
                }
            }

            // ============================================================
            // 3. 渲染网格（带 Live Photo 效果）
            // ============================================================
            function renderGrid() {
                grid.innerHTML = '';
                IMAGES.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'grid-item';
                    div.setAttribute('role', 'button');
                    div.setAttribute('tabindex', '0');
                    div.setAttribute('aria-label', `查看图片 ${index + 1}: ${item.alt}`);

                    const wrapper = document.createElement('div');
                    wrapper.className = 'media-wrapper';

                    // 图片（始终显示）
                    const img = document.createElement('img');
                    img.src = item.src;
                    img.alt = item.alt;
                    img.loading = 'lazy';
                    wrapper.appendChild(img);

                    // 如果有视频，添加 video 并控制悬停/长按播放
                    if (item.video) {
                        const video = document.createElement('video');
                        video.src = item.video;
                        video.muted = true;
                        video.playsInline = true;
                        video.loop = true;
                        video.preload = 'metadata';
                        video.setAttribute('aria-hidden', 'true');
                        wrapper.appendChild(video);

                        // 桌面：mouseenter 播放，mouseleave 暂停并重置
                        div.addEventListener('mouseenter', () => {
                            video.classList.add('active');
                            video.play().catch(() => {});
                        });
                        div.addEventListener('mouseleave', () => {
                            video.classList.remove('active');
                            video.pause();
                            video.currentTime = 0;
                        });

                        // 移动端：touchstart 长按播放，touchend 暂停
                        let touchTimer = null;
                        div.addEventListener('touchstart', () => {
                            touchTimer = setTimeout(() => {
                                video.classList.add('active');
                                video.play().catch(() => {});
                            }, 300);
                        }, { passive: true });
                        div.addEventListener('touchend', () => {
                            clearTimeout(touchTimer);
                            video.classList.remove('active');
                            video.pause();
                            video.currentTime = 0;
                        }, { passive: true });
                        div.addEventListener('touchcancel', () => {
                            clearTimeout(touchTimer);
                            video.classList.remove('active');
                            video.pause();
                            video.currentTime = 0;
                        }, { passive: true });
                    }

                    div.appendChild(wrapper);

                    // 点击打开灯箱
                    div.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openLightbox(index);
                    });
                    div.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            openLightbox(index);
                        }
                    });

                    grid.appendChild(div);
                });
            }

            // ============================================================
            // 4. 灯箱 (Swiper) – 最稳定版本
            // ============================================================
            function openLightbox(index) {
                if (!IMAGES.length) return;
                currentIndex = Math.min(index, IMAGES.length - 1);
                console.log('🖱️ 打开灯箱，目标索引:', currentIndex);
                buildSwiper(currentIndex);
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
                updateCounter(currentIndex);
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
                if (swiperInstance) {
                    document.querySelectorAll('.swiper-slide video').forEach(v => v.pause());
                    swiperInstance.destroy(true, true);
                    swiperInstance = null;
                }
                swiperWrapper.innerHTML = '';
            }

            function buildSwiper(initialSlide) {
                // 清空 wrapper
                swiperWrapper.innerHTML = '';
                console.log('🔨 构建 Swiper，目标索引:', initialSlide);
                // 生成 slides
                IMAGES.forEach((item, idx) => {
                    console.log(`  Slide ${idx}: src=${item.src}, video=${item.video || '无'}`);
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    if (item.video) {
                        const video = document.createElement('video');
                        video.src = item.video;
                        video.poster = item.src;
                        video.controls = true;
                        video.muted = true;
                        video.playsInline = true;
                        video.preload = 'metadata';
                        video.setAttribute('playsinline', '');
                        video.addEventListener('click', (e) => e.stopPropagation());
                        slide.appendChild(video);
                    } else {
                        const img = document.createElement('img');
                        img.src = item.src;
                        img.alt = item.alt;
                        slide.appendChild(img);
                    }
                    swiperWrapper.appendChild(slide);
                });

                // 销毁旧实例
                if (swiperInstance) {
                    swiperInstance.destroy(true, true);
                    swiperInstance = null;
                }

                // 初始化新实例（使用选择器字符串方式，更稳定）
                swiperInstance = new Swiper('.swiper-container', {
                    initialSlide: initialSlide, // 直接设定初始索引
                    effect: 'fade',
                    fadeEffect: { crossFade: true },
                    speed: 400,
                    loop: false,
                    navigation: {
                        prevEl: '#prevBtn',   // 使用 ID 选择器
                        nextEl: '#nextBtn',
                    },
                    on: {
                        slideChangeTransitionEnd: function() {
                            const slides = document.querySelectorAll('.swiper-slide');
                            slides.forEach((slide, idx) => {
                                const video = slide.querySelector('video');
                                if (video) {
                                    if (idx === this.activeIndex) {
                                        video.play().catch(() => {});
                                    } else {
                                        video.pause();
                                    }
                                }
                            });
                            updateCounter(this.activeIndex);
                            console.log('🔄 当前激活索引:', this.activeIndex);
                        },
                        init: function() {
                            console.log('✅ Swiper 初始化完成，当前索引:', this.activeIndex);
                            // 如果因为某些原因索引不对，强制修正
                            if (this.activeIndex !== initialSlide) {
                                console.warn('⚠️ 索引不匹配，强制跳转到:', initialSlide);
                                this.slideTo(initialSlide, 0);
                            }
                            // 播放当前视频
                            const currentSlide = this.slides[this.activeIndex];
                            if (currentSlide) {
                                const video = currentSlide.querySelector('video');
                                if (video) {
                                    video.play().catch(() => {});
                                }
                            }
                            // 更新导航按钮状态
                            this.navigation.update();
                        }
                    }
                });

                // 双重保险：再延迟强制一次
                setTimeout(() => {
                    if (swiperInstance) {
                        const current = swiperInstance.activeIndex;
                        if (current !== initialSlide) {
                            console.warn('⏰ 延迟修正索引:', initialSlide);
                            swiperInstance.slideTo(initialSlide, 0);
                            updateCounter(initialSlide);
                        }
                    }
                }, 200);
            }

            function updateCounter(index) {
                counter.textContent = `${index + 1} / ${IMAGES.length}`;
            }

            // ============================================================
            // 5. 键盘事件
            // ============================================================
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;
                switch (e.key) {
                    case 'Escape':
                        closeLightbox();
                        e.preventDefault();
                        break;
                    case 'ArrowLeft':
                        if (swiperInstance) swiperInstance.slidePrev();
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                        if (swiperInstance) swiperInstance.slideNext();
                        e.preventDefault();
                        break;
                }
            });

            // ============================================================
            // 6. UI 事件绑定
            // ============================================================
            closeBtn.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });

            // ============================================================
            // 7. 启动
            // ============================================================
            loadImages();
        })();
    </script>

</body>

</html>
