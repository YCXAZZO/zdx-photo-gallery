    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        (function () {
            'use strict';

            // ============================================================
            // 0. 背景音乐功能
            // ============================================================
            const bgmToggle = document.getElementById('bgmToggle');
            const bgmIcon = document.getElementById('bgmIcon');
            const bgmAudio = document.getElementById('bgmAudio');

            let bgmPlaying = false;
            let bgmUserClosed = localStorage.getItem('userCloseBgm') === '1';
            let bgmAutoPaused = sessionStorage.getItem('bgmAutoPause') === '1';

            function updateBgmIcon() {
                if (bgmUserClosed) {
                    bgmIcon.textContent = '🔇';
                    bgmIcon.className = 'icon paused muted';
                    return;
                }
                if (bgmPlaying) {
                    bgmIcon.textContent = '🎵';
                    bgmIcon.className = 'icon playing';
                } else {
                    bgmIcon.textContent = '🎵';
                    bgmIcon.className = 'icon paused';
                }
            }

            function tryPlayBgm() {
                if (bgmUserClosed) return;
                if (bgmAutoPaused) return;
                bgmAudio.play().then(() => {
                    bgmPlaying = true;
                    updateBgmIcon();
                }).catch(() => { });
            }

            function pauseBgm(reason) {
                if (bgmUserClosed) return;
                if (!bgmPlaying) return;
                bgmAudio.pause();
                bgmPlaying = false;
                if (reason === 'video') {
                    sessionStorage.setItem('bgmAutoPause', '1');
                    bgmAutoPaused = true;
                }
                updateBgmIcon();
            }

            function toggleBgm() {
                if (bgmUserClosed) {
                    bgmUserClosed = false;
                    localStorage.removeItem('userCloseBgm');
                    sessionStorage.removeItem('bgmAutoPause');
                    bgmAutoPaused = false;
                    tryPlayBgm();
                    return;
                }
                if (bgmPlaying) {
                    bgmAudio.pause();
                    bgmPlaying = false;
                    bgmUserClosed = true;
                    localStorage.setItem('userCloseBgm', '1');
                    sessionStorage.removeItem('bgmAutoPause');
                    bgmAutoPaused = false;
                    updateBgmIcon();
                } else {
                    bgmUserClosed = false;
                    localStorage.removeItem('userCloseBgm');
                    sessionStorage.removeItem('bgmAutoPause');
                    bgmAutoPaused = false;
                    tryPlayBgm();
                }
            }

            bgmToggle.addEventListener('click', toggleBgm);
            bgmAudio.addEventListener('play', () => {
                bgmPlaying = true;
                updateBgmIcon();
            });
            bgmAudio.addEventListener('pause', () => {
                bgmPlaying = false;
                updateBgmIcon();
            });
            updateBgmIcon();

            // ============================================================
            // 1. DOM 引用
            // ============================================================
            const grid = document.getElementById('photoGrid');
            const lightbox = document.getElementById('lightbox');
            const closeBtn = document.getElementById('closeBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const counter = document.getElementById('counter');
            const swiperWrapper = document.getElementById('swiperWrapper');
            const swiperContainer = document.getElementById('swiperContainer');
            const visitCounter = document.getElementById('visitCounter');
            const photoCountEl = document.getElementById('photoCount');
            const liveCountEl = document.getElementById('liveCount');
            const videoCountEl = document.getElementById('videoCount');

            const debugToggle = document.getElementById('debugToggle');
            const passwordModal = document.getElementById('passwordModal');
            const passwordInput = document.getElementById('passwordInput');
            const passwordError = document.getElementById('passwordError');
            const passwordConfirmBtn = document.getElementById('passwordConfirmBtn');
            const passwordCancelBtn = document.getElementById('passwordCancelBtn');
            const passwordCloseBtn = document.getElementById('passwordCloseBtn');

            const adminModal = document.getElementById('adminModal');
            const adminCloseBtn = document.getElementById('adminCloseBtn');
            const adminCancelBtn = document.getElementById('adminCancelBtn');
            const adminSaveBtn = document.getElementById('adminSaveBtn');
            const adminBody = document.getElementById('adminBody');
            const adminToFansBtn = document.getElementById('adminToFansBtn');

            const fansAdminModal = document.getElementById('fansAdminModal');
            const fansAdminCloseBtn = document.getElementById('fansAdminCloseBtn');
            const fansAdminCancelBtn = document.getElementById('fansAdminCancelBtn');
            const fansAdminAddBtn = document.getElementById('fansAdminAddBtn');
            const fansAdminBody = document.getElementById('fansAdminBody');
            const fansToAdminBtn = document.getElementById('fansToAdminBtn');

            const fansFormModal = document.getElementById('fansFormModal');
            const fansFormCloseBtn = document.getElementById('fansFormCloseBtn');
            const fansFormCancelBtn = document.getElementById('fansFormCancelBtn');
            const fansFormSaveBtn = document.getElementById('fansFormSaveBtn');
            const fansFormTitle = document.getElementById('fansFormTitle');
            const fansFormId = document.getElementById('fansFormId');
            const fansFormType = document.getElementById('fansFormType');
            const fansFormSrc = document.getElementById('fansFormSrc');
            const fansFormVideo = document.getElementById('fansFormVideo');
            // 新增 poster 元素
            const fansFormPoster = document.getElementById('fansFormPoster');
            const fansFormCreator = document.getElementById('fansFormCreator');
            const fansFormMessage = document.getElementById('fansFormMessage');
            const fansFormCategory = document.getElementById('fansFormCategory');
            const fansFormDate = document.getElementById('fansFormDate');
            const fansFormFeatured = document.getElementById('fansFormFeatured');
            const fansFormActive = document.getElementById('fansFormActive');

            const uploadDropZone = document.getElementById('fansUploadDropZone');
            const fileInput = document.getElementById('fansFileInput');
            const uploadProgress = document.getElementById('fansUploadProgress');
            const uploadProgressBar = document.getElementById('fansUploadProgressBar');
            const uploadStatus = document.getElementById('fansUploadStatus');

            let swiperInstance = null;
            let currentIndex = 0;
            let rawImages = [];
            let IMAGES = [];
            let pinnedFiles = [];
            const collapseState = {};
            let adminFileList = [];
            const ADMIN_PASSWORD = '2432';

            let currentSource = 'official';
            let fansList = [];

            // ============================================================
            // 2. 加载官方数据 & 初始化来源状态
            // ============================================================
            async function loadImages() {
                // 从 localStorage 恢复来源状态
                const savedSource = localStorage.getItem('photoWallSource');
                if (savedSource === 'fans' || savedSource === 'official') {
                    currentSource = savedSource;
                } else {
                    currentSource = 'official';
                }
                // 同步按钮状态
                document.querySelectorAll('.sort-btn[data-source]').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.source === currentSource);
                });

                try {
                    const response = await fetch('data.json');
                    if (!response.ok) throw new Error('data.json 加载失败');
                    const data = await response.json();
                    rawImages = data;
                    if (!rawImages.length) {
                        grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:var(--text-secondary); padding:3rem 0;">暂无照片，请添加图片。</p>';
                        return;
                    }
                    await fetchPinnedList();
                    // 如果当前是粉丝模式，先加载粉丝数据
                    if (currentSource === 'fans') {
                        await fetchFansData();
                    }
                    applySortAndRender();
                    updateStats();
                    console.log('📸 照片墙已加载，图片数量:', rawImages.length);
                } catch (error) {
                    console.error('加载图片数据失败:', error);
                    grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#e0786a; padding:3rem 0;">⚠️ 数据加载失败，请检查部署。</p>';
                }
            }

            async function fetchPinnedList() {
                try {
                    const res = await fetch('/api/get-pinned');
                    if (!res.ok) throw new Error('获取置顶列表失败');
                    const data = await res.json();
                    pinnedFiles = data.pinned || [];
                    console.log('📌 从 API 获取的置顶列表:', pinnedFiles);
                } catch (error) {
                    console.warn('获取置顶列表失败，使用空列表:', error);
                    pinnedFiles = [];
                }
            }

            async function updateVisitCount() {
                try {
                    const res = await fetch('/api/visit');
                    if (!res.ok) throw new Error('获取访客数失败');
                    const data = await res.json();
                    visitCounter.textContent = `访问数：${data.count}👀`;
                } catch (error) {
                    console.warn('访客计数失败:', error);
                    visitCounter.textContent = '访问数：--';
                }
            }

            function updateStats() {
                let photoCount = 0,
                    liveCount = 0,
                    videoCount = 0;
                rawImages.forEach(item => {
                    const type = getMediaType(item);
                    if (type === 'photo') photoCount++;
                    else if (type === 'live') liveCount++;
                    else if (type === 'video') videoCount++;
                });
                photoCountEl.textContent = photoCount;
                liveCountEl.textContent = liveCount;
                videoCountEl.textContent = videoCount;
            }

            function getMediaType(item) {
                if (item.isVideoOnly) return 'video';
                if (item.video) {
                    const srcLower = item.src.toLowerCase();
                    const videoLower = item.video.toLowerCase();
                    if (srcLower.includes('/video/') || srcLower.includes('/vlog/') ||
                        videoLower.includes('/video/') || videoLower.includes('/vlog/')) {
                        return 'video';
                    }
                    return 'live';
                }
                return 'photo';
            }

            // ============================================================
            // 3. 获取粉丝数据（独立函数）
            // ============================================================
            async function fetchFansData() {
                try {
                    const res = await fetch('/api/fans/list', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: ADMIN_PASSWORD })
                    });
                    const result = await res.json();
                    if (result.success) {
                        fansList = result.data || [];
                        console.log('📡 粉丝数据已加载，数量:', fansList.length);
                    } else {
                        console.warn('加载粉丝数据失败:', result.error);
                        fansList = [];
                    }
                } catch (error) {
                    console.warn('加载粉丝数据网络错误:', error);
                    fansList = [];
                }
            }

            // ============================================================
            // 4. 排序与渲染
            // ============================================================
            function applySortAndRender() {
                const modeRow = document.getElementById('modeRow');
                const subRow = document.getElementById('subRow');

                if (currentSource === 'fans') {
                    modeRow.style.display = 'none';
                    subRow.style.display = 'none';
                    renderFansMode();
                    return;
                }
                modeRow.style.display = 'flex';
                subRow.style.display = 'flex';

                const activeMode = document.querySelector('.sort-btn[data-mode].active');
                if (!activeMode) return;
                const mode = activeMode.dataset.mode;
                const subContainer = mode === 'time' ? document.getElementById('timeOptions') : document.getElementById(
                    'typeOptions');
                const activeSub = subContainer.querySelector('.sort-btn[data-sub].active');
                if (!activeSub) return;
                const subValue = activeSub.dataset.sub;

                console.log('🔀 模式:', mode, '子选项:', subValue);

                const pinnedItems = [];
                const unpinnedItems = [];
                rawImages.forEach(item => {
                    const fileName = item.src.split('/').pop();
                    if (pinnedFiles.includes(fileName)) {
                        pinnedItems.push(item);
                    } else {
                        unpinnedItems.push(item);
                    }
                });
                pinnedItems.sort((a, b) => {
                    const aName = a.src.split('/').pop();
                    const bName = b.src.split('/').pop();
                    return pinnedFiles.indexOf(aName) - pinnedFiles.indexOf(bName);
                });

                if (mode === 'time') {
                    unpinnedItems.sort((a, b) => {
                        const t1 = a.timestamp || 0;
                        const t2 = b.timestamp || 0;
                        return subValue === 'old' ? t1 - t2 : t2 - t1;
                    });
                } else {
                    const photos = unpinnedItems.filter(item => getMediaType(item) === 'photo');
                    const lives = unpinnedItems.filter(item => getMediaType(item) === 'live');
                    const videos = unpinnedItems.filter(item => getMediaType(item) === 'video');
                    const sortByTime = (arr) => arr.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    sortByTime(photos);
                    sortByTime(lives);
                    sortByTime(videos);

                    const groups = { photo: photos, live: lives, video: videos };
                    const order = ['photo', 'live', 'video'];
                    if (subValue === 'live') {
                        order.splice(0, 0, order.splice(order.indexOf('live'), 1)[0]);
                    } else if (subValue === 'video') {
                        order.splice(0, 0, order.splice(order.indexOf('video'), 1)[0]);
                    }
                    const result = [];
                    order.forEach(key => {
                        if (groups[key] && groups[key].length > 0) {
                            result.push({ type: key, items: groups[key] });
                        }
                    });
                    const pinnedGroup = pinnedItems.length > 0 ? { type: 'pinned', items: pinnedItems } : null;
                    renderGridWithSections(mode, subValue, pinnedGroup, result);
                    return;
                }
                const pinnedGroup = pinnedItems.length > 0 ? { type: 'pinned', items: pinnedItems } : null;
                renderGridWithSections(mode, subValue, pinnedGroup, unpinnedItems);
            }

            function renderFansMode() {
                grid.innerHTML = '';
                if (fansList.length === 0) {
                    grid.innerHTML = `
                        <p style="grid-column:1/-1; text-align:center; color:var(--text-secondary); padding:3rem 0; font-size:1.1rem;">
                            ✨ 暂无粉丝作品<br>
                            <span style="font-size:0.85rem; color:var(--text-muted);">敬请期待</span>
                        </p>
                    `;
                    return;
                }
                const activeItems = fansList.filter(item => item.isActive !== false);
                const featured = activeItems.filter(item => item.isFeatured);
                const normal = activeItems.filter(item => !item.isFeatured);
                [...featured, ...normal].forEach(item => {
                    const card = createCard(item);
                    grid.appendChild(card);
                });
                if (lightbox.classList.contains('active')) closeLightbox();
                IMAGES = [];
            }

            function renderGridWithSections(mode, subValue, pinnedGroup, unpinnedData) {
                grid.innerHTML = '';
                if (pinnedGroup && pinnedGroup.items && pinnedGroup.items.length > 0) {
                    const key = 'pinned';
                    if (collapseState[key] === undefined) collapseState[key] = false;
                    const divider = createDivider('📌 置顶', '', key, collapseState[key]);
                    grid.appendChild(divider);
                    const itemsContainer = document.createElement('div');
                    itemsContainer.className = `section-items${collapseState[key] ? ' collapsed' : ''}`;
                    itemsContainer.dataset.sectionKey = key;
                    pinnedGroup.items.forEach(item => {
                        const card = createCard(item);
                        itemsContainer.appendChild(card);
                    });
                    grid.appendChild(itemsContainer);
                }

                if (mode === 'time') {
                    const unpinned = unpinnedData || [];
                    const yearMonthGroups = {};
                    unpinned.forEach(item => {
                        const date = new Date(item.timestamp);
                        const yearMonth = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
                        if (!yearMonthGroups[yearMonth]) yearMonthGroups[yearMonth] = [];
                        yearMonthGroups[yearMonth].push(item);
                    });
                    const yearMonths = Object.keys(yearMonthGroups).sort((a, b) => {
                        return subValue === 'old' ? a.localeCompare(b) : b.localeCompare(a);
                    });
                    yearMonths.forEach((yearMonth) => {
                        const key = `ym-${yearMonth}`;
                        if (collapseState[key] === undefined) collapseState[key] = false;
                        const divider = createDivider(yearMonth, '', key, collapseState[key]);
                        grid.appendChild(divider);
                        const itemsContainer = document.createElement('div');
                        itemsContainer.className = `section-items${collapseState[key] ? ' collapsed' : ''}`;
                        itemsContainer.dataset.sectionKey = key;
                        yearMonthGroups[yearMonth].forEach(item => {
                            const card = createCard(item);
                            itemsContainer.appendChild(card);
                        });
                        grid.appendChild(itemsContainer);
                    });
                } else {
                    const groups = unpinnedData || [];
                    const typeLabels = {
                        photo: { zh: '照片', en: 'Photo' },
                        live: { zh: '实况', en: 'Live' },
                        video: { zh: '视频', en: 'Vlog' }
                    };
                    groups.forEach(group => {
                        const key = `type-${group.type}`;
                        if (collapseState[key] === undefined) collapseState[key] = false;
                        const label = typeLabels[group.type] || { zh: group.type, en: '' };
                        const divider = createDivider(label.zh, label.en, key, collapseState[key]);
                        grid.appendChild(divider);
                        const itemsContainer = document.createElement('div');
                        itemsContainer.className = `section-items${collapseState[key] ? ' collapsed' : ''}`;
                        itemsContainer.dataset.sectionKey = key;
                        group.items.forEach(item => {
                            const card = createCard(item);
                            itemsContainer.appendChild(card);
                        });
                        grid.appendChild(itemsContainer);
                    });
                }

                if (lightbox.classList.contains('active')) closeLightbox();
                IMAGES = [];
                const allItems = grid.querySelectorAll('.grid-item');
                allItems.forEach(el => {
                    const img = el.querySelector('img');
                    if (img) {
                        const src = img.src;
                        const found = rawImages.find(item => item.src === src);
                        if (found) IMAGES.push(found);
                    } else {
                        const video = el.querySelector('video');
                        if (video) {
                            const src = video.src;
                            const found = rawImages.find(item => item.video === src);
                            if (found) IMAGES.push(found);
                        }
                    }
                });
                if (IMAGES.length === 0) IMAGES = [...rawImages];
            }

            function createDivider(zhText, enText, key, isCollapsed) {
                const div = document.createElement('div');
                div.className = 'section-divider';
                div.dataset.sectionKey = key;
                const labelSpan = document.createElement('span');
                labelSpan.className = 'label';
                const zhSpan = document.createElement('span');
                zhSpan.className = 'zh';
                zhSpan.textContent = zhText;
                labelSpan.appendChild(zhSpan);
                if (enText) {
                    const enSpan = document.createElement('span');
                    enSpan.className = 'en';
                    enSpan.textContent = enText;
                    labelSpan.appendChild(enSpan);
                }
                const iconSpan = document.createElement('span');
                iconSpan.className = `toggle-icon${isCollapsed ? ' collapsed' : ''}`;
                iconSpan.textContent = '▼';
                const lineSpan = document.createElement('span');
                lineSpan.className = 'line';
                div.appendChild(lineSpan);
                div.appendChild(labelSpan);
                div.appendChild(iconSpan);
                div.addEventListener('click', function (e) {
                    e.stopPropagation();
                    const sectionKey = this.dataset.sectionKey;
                    collapseState[sectionKey] = !collapseState[sectionKey];
                    const icon = this.querySelector('.toggle-icon');
                    if (icon) icon.classList.toggle('collapsed');
                    const itemsContainer = grid.querySelector(`.section-items[data-section-key="${sectionKey}"]`);
                    if (itemsContainer) itemsContainer.classList.toggle('collapsed');
                });
                return div;
            }

            // ============================================================
            // 5. 卡片与灯箱（包含精选标签 + poster 支持）
            // ============================================================
            function createCard(item) {
                const div = document.createElement('div');
                div.className = 'grid-item';
                div.setAttribute('role', 'button');
                div.setAttribute('tabindex', '0');
                div.setAttribute('aria-label', `查看${item.isVideoOnly ? '视频' : '图片'}: ${item.alt}`);

                const wrapper = document.createElement('div');
                wrapper.className = 'media-wrapper';

                const isFans = item.creatorId !== undefined;

                if (item.isVideoOnly) {
                    const video = document.createElement('video');
                    video.src = item.video;
                    video.muted = true;
                    video.playsInline = true;
                    video.loop = true;
                    video.preload = 'metadata';
                    video.setAttribute('aria-hidden', 'true');
                    video.classList.add('visible');

                    // ===== 优先使用 poster，否则调用 load 显示第一帧 =====
                    if (item.poster) {
                        video.poster = item.poster;
                    } else {
                        video.load();
                    }

                    wrapper.appendChild(video);

                    video.addEventListener('play', () => {
                        if (!bgmUserClosed && bgmPlaying) {
                            pauseBgm('video');
                        }
                    });

                    // 桌面悬停
                    div.addEventListener('mouseenter', () => {
                        video.play().catch(() => { });
                    });
                    div.addEventListener('mouseleave', () => {
                        video.pause();
                        video.currentTime = 0;
                    });

                    // 移动端长按
                    let touchTimer = null;
                    div.addEventListener('touchstart', () => {
                        touchTimer = setTimeout(() => {
                            video.play().catch(() => { });
                        }, 300);
                    }, { passive: true });
                    div.addEventListener('touchend', () => {
                        clearTimeout(touchTimer);
                        video.pause();
                        video.currentTime = 0;
                    }, { passive: true });
                    div.addEventListener('touchcancel', () => {
                        clearTimeout(touchTimer);
                        video.pause();
                        video.currentTime = 0;
                    }, { passive: true });
                } else {
                    const img = document.createElement('img');
                    img.src = item.src;
                    img.alt = item.alt;
                    img.loading = 'lazy';
                    wrapper.appendChild(img);

                    if (item.video) {
                        const video = document.createElement('video');
                        video.src = item.video;
                        video.muted = true;
                        video.playsInline = true;
                        video.loop = true;
                        video.preload = 'none';
                        video.setAttribute('aria-hidden', 'true');
                        wrapper.appendChild(video);

                        video.addEventListener('play', () => {
                            if (!bgmUserClosed && bgmPlaying) {
                                pauseBgm('video');
                            }
                        });

                        div.addEventListener('mouseenter', () => {
                            video.classList.add('active');
                            video.play().catch(() => { });
                        });
                        div.addEventListener('mouseleave', () => {
                            video.classList.remove('active');
                            video.pause();
                            video.currentTime = 0;
                        });

                        let touchTimer = null;
                        div.addEventListener('touchstart', () => {
                            touchTimer = setTimeout(() => {
                                video.classList.add('active');
                                video.play().catch(() => { });
                            }, 300);
                        }, { passive: true });
                        div.addEventListener('touchend', () => {
                            clearTimeout(touchTimer);
                            video.classList.remove('active');
                            video.pause();
                            video.currentTime = 0;
                        }, { passive: true });
                        div.addEventListener('touchcancel', () => {
                            clearTimeout(touchTimer);
                            video.classList.remove('active');
                            video.pause();
                            video.currentTime = 0;
                        }, { passive: true });
                    }
                }

                if (isFans) {
                    const infoBar = document.createElement('div');
                    infoBar.style.cssText = `
                        position: absolute;
                        bottom: 0;
                        left: 0;
                        right: 0;
                        background: rgba(0,0,0,0.5);
                        backdrop-filter: blur(4px);
                        padding: 4px 8px;
                        color: #fff;
                        font-size: 0.7rem;
                        display: flex;
                        flex-direction: column;
                        pointer-events: none;
                        z-index: 2;
                    `;
                    const idLine = document.createElement('span');
                    idLine.textContent = `创作者：${item.creatorId}`;
                    const msgLine = document.createElement('span');
                    const msg = item.message || '';
                    msgLine.textContent = msg.length > 15 ? msg.slice(0, 15) + '...' : msg;
                    infoBar.appendChild(idLine);
                    infoBar.appendChild(msgLine);
                    div.appendChild(infoBar);

                    // 精选角标
                    if (item.isFeatured) {
                        const badge = document.createElement('div');
                        badge.textContent = '⭐ 精选';
                        badge.style.cssText = `
                            position: absolute;
                            top: 8px;
                            left: 8px;
                            background: rgba(0, 0, 0, 0.55);
                            backdrop-filter: blur(4px);
                            border-radius: 6px;
                            padding: 2px 10px;
                            color: #fff;
                            font-size: 12px;
                            font-weight: 500;
                            letter-spacing: 0.5px;
                            z-index: 3;
                            pointer-events: none;
                            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
                        `;
                        div.appendChild(badge);
                    }
                }

                div.appendChild(wrapper);

                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    let src = item.isVideoOnly ? item.video : item.src;
                    let idx;
                    if (isFans) {
                        const flat = fansList.filter(i => i.isActive !== false);
                        const featured = flat.filter(i => i.isFeatured);
                        const normal = flat.filter(i => !i.isFeatured);
                        const ordered = [...featured, ...normal];
                        idx = ordered.findIndex(i => i.id === item.id);
                    } else {
                        idx = IMAGES.findIndex(i => (i.isVideoOnly ? i.video : i.src) === src);
                        if (idx === -1) {
                            idx = rawImages.findIndex(i => (i.isVideoOnly ? i.video : i.src) === src);
                        }
                    }
                    if (idx !== -1) {
                        if (isFans) {
                            const tempImages = fansList.filter(i => i.isActive !== false);
                            const feat = tempImages.filter(i => i.isFeatured);
                            const norm = tempImages.filter(i => !i.isFeatured);
                            const ordered = [...feat, ...norm];
                            buildLightboxForFans(ordered, idx);
                            lightbox.classList.add('active');
                            document.body.style.overflow = 'hidden';
                        } else {
                            openLightbox(idx);
                        }
                    }
                });
                div.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        div.click();
                    }
                });

                return div;
            }

            function buildLightboxForFans(items, initialSlide) {
                swiperWrapper.innerHTML = '';
                items.forEach((item) => {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    const zoomContainer = document.createElement('div');
                    zoomContainer.className = 'swiper-zoom-container';
                    if (item.video) {
                        const video = document.createElement('video');
                        video.src = item.video;
                        video.poster = item.poster || item.src; // 优先使用 poster
                        video.controls = true;
                        video.muted = true;
                        video.playsInline = true;
                        video.preload = 'metadata';
                        video.setAttribute('playsinline', '');
                        video.addEventListener('play', () => {
                            if (!bgmUserClosed && bgmPlaying) {
                                pauseBgm('video');
                            }
                        });
                        zoomContainer.appendChild(video);
                    } else {
                        const img = document.createElement('img');
                        img.src = item.src;
                        img.alt = item.alt || '粉丝作品';
                        zoomContainer.appendChild(img);
                    }
                    slide.appendChild(zoomContainer);
                    const infoBar = document.createElement('div');
                    infoBar.style.cssText = `
                        position: absolute;
                        bottom: 0;
                        left: 0;
                        right: 0;
                        background: rgba(0,0,0,0.6);
                        backdrop-filter: blur(8px);
                        padding: 12px 16px;
                        color: #fff;
                        font-size: 0.85rem;
                        display: flex;
                        flex-direction: column;
                        gap: 4px;
                        pointer-events: none;
                        z-index: 10;
                    `;
                    const line1 = document.createElement('div');
                    line1.innerHTML = `<strong>创作者：</strong>${item.creatorId}`;
                    const line2 = document.createElement('div');
                    line2.innerHTML = `<strong>分类：</strong>${item.category || '未分类'}`;
                    const line3 = document.createElement('div');
                    line3.innerHTML = `<strong>寄语：</strong>${item.message || '无'}`;
                    const line4 = document.createElement('div');
                    line4.innerHTML = `<strong>日期：</strong>${item.date || ''}`;
                    infoBar.appendChild(line1);
                    infoBar.appendChild(line2);
                    infoBar.appendChild(line3);
                    infoBar.appendChild(line4);
                    slide.appendChild(infoBar);
                    swiperWrapper.appendChild(slide);
                });

                if (swiperInstance) {
                    swiperInstance.destroy(true, true);
                    swiperInstance = null;
                }

                swiperInstance = new Swiper(swiperContainer, {
                    initialSlide: initialSlide,
                    slidesPerView: 1,
                    centeredSlides: true,
                    effect: 'fade',
                    fadeEffect: { crossFade: true },
                    speed: 400,
                    loop: false,
                    touchEventsTarget: 'container',
                    navigation: {
                        prevEl: prevBtn,
                        nextEl: nextBtn,
                    },
                    zoom: {
                        maxRatio: 5,
                        minRatio: 1,
                        toggle: true
                    },
                    observer: true,
                    observeParents: true,
                    on: {
                        slideChangeTransitionEnd: function () {
                            const idx = this.activeIndex;
                            counter.textContent = `${idx + 1} / ${items.length}`;
                            this.slides.forEach((slide, i) => {
                                const video = slide.querySelector('video');
                                if (video) {
                                    if (i === idx) {
                                        video.play().catch(() => { });
                                    } else {
                                        video.pause();
                                    }
                                }
                            });
                        },
                        init: function () {
                            this.navigation.update();
                            counter.textContent = `${this.activeIndex + 1} / ${items.length}`;
                            const slide = this.slides[this.activeIndex];
                            if (slide) {
                                const video = slide.querySelector('video');
                                if (video) video.play().catch(() => { });
                            }
                        }
                    }
                });
                setTimeout(() => {
                    if (swiperInstance && swiperInstance.activeIndex !== initialSlide) {
                        swiperInstance.slideTo(initialSlide, 0);
                        counter.textContent = `${initialSlide + 1} / ${items.length}`;
                    }
                }, 100);
            }

            function openLightbox(index) {
                if (!IMAGES.length) { console.warn('IMAGES 为空'); return; }
                currentIndex = Math.min(index, IMAGES.length - 1);
                buildSwiper(currentIndex);
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
                updateCounter(currentIndex);
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
                if (swiperInstance) {
                    document.querySelectorAll('.swiper-slide video').forEach(v => v.pause());
                    swiperInstance.destroy(true, true);
                    swiperInstance = null;
                }
                swiperWrapper.innerHTML = '';
            }

            function buildSwiper(initialSlide) {
                swiperWrapper.innerHTML = '';
                IMAGES.forEach((item) => {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    const zoomContainer = document.createElement('div');
                    zoomContainer.className = 'swiper-zoom-container';
                    if (item.video) {
                        const video = document.createElement('video');
                        video.src = item.video;
                        video.poster = item.poster || (item.isVideoOnly ? '' : item.src);
                        video.controls = true;
                        video.muted = true;
                        video.playsInline = true;
                        video.preload = 'metadata';
                        video.setAttribute('playsinline', '');
                        video.addEventListener('play', () => {
                            if (!bgmUserClosed && bgmPlaying) {
                                pauseBgm('video');
                            }
                        });
                        zoomContainer.appendChild(video);
                    } else {
                        const img = document.createElement('img');
                        img.src = item.src;
                        img.alt = item.alt;
                        zoomContainer.appendChild(img);
                    }
                    slide.appendChild(zoomContainer);
                    swiperWrapper.appendChild(slide);
                });

                if (swiperInstance) {
                    swiperInstance.destroy(true, true);
                    swiperInstance = null;
                }

                swiperInstance = new Swiper(swiperContainer, {
                    initialSlide: initialSlide,
                    slidesPerView: 1,
                    centeredSlides: true,
                    effect: 'fade',
                    fadeEffect: { crossFade: true },
                    speed: 400,
                    loop: false,
                    touchEventsTarget: 'container',
                    navigation: {
                        prevEl: prevBtn,
                        nextEl: nextBtn,
                    },
                    zoom: {
                        maxRatio: 5,
                        minRatio: 1,
                        toggle: true
                    },
                    observer: true,
                    observeParents: true,
                    on: {
                        slideChangeTransitionEnd: function () {
                            const idx = this.activeIndex;
                            updateCounter(idx);
                            this.slides.forEach((slide, i) => {
                                const video = slide.querySelector('video');
                                if (video) {
                                    if (i === idx) {
                                        video.play().catch(() => { });
                                    } else {
                                        video.pause();
                                    }
                                }
                            });
                        },
                        init: function () {
                            this.navigation.update();
                            updateCounter(this.activeIndex);
                            const slide = this.slides[this.activeIndex];
                            if (slide) {
                                const video = slide.querySelector('video');
                                if (video) video.play().catch(() => { });
                            }
                        }
                    }
                });
                setTimeout(() => {
                    if (swiperInstance && swiperInstance.activeIndex !== initialSlide) {
                        swiperInstance.slideTo(initialSlide, 0);
                        updateCounter(initialSlide);
                    }
                }, 100);
            }

            function updateCounter(index) {
                counter.textContent = `${index + 1} / ${IMAGES.length}`;
            }

            // ============================================================
            // 6. 键盘事件
            // ============================================================
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;
                switch (e.key) {
                    case 'Escape':
                        closeLightbox();
                        e.preventDefault();
                        break;
                    case 'ArrowLeft':
                        if (swiperInstance) swiperInstance.slidePrev();
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                        if (swiperInstance) swiperInstance.slideNext();
                        e.preventDefault();
                        break;
                }
            });

            // ============================================================
            // 7. UI 事件绑定（含来源状态持久化）
            // ============================================================
            closeBtn.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });

            document.querySelectorAll('.sort-btn[data-mode]').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.sort-btn[data-mode]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const mode = this.dataset.mode;
                    document.getElementById('timeOptions').classList.toggle('show', mode === 'time');
                    document.getElementById('typeOptions').classList.toggle('show', mode === 'type');
                    Object.keys(collapseState).forEach(key => { collapseState[key] = false; });
                    applySortAndRender();
                });
            });

            document.querySelectorAll('.sub-options .sort-btn[data-sub]').forEach(btn => {
                btn.addEventListener('click', function () {
                    const parent = this.closest('.sub-options');
                    parent.querySelectorAll('.sort-btn[data-sub]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    Object.keys(collapseState).forEach(key => { collapseState[key] = false; });
                    applySortAndRender();
                });
            });

            document.querySelectorAll('.sort-btn[data-source]').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.sort-btn[data-source]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentSource = this.dataset.source;
                    localStorage.setItem('photoWallSource', currentSource);
                    const modeRow = document.getElementById('modeRow');
                    const subRow = document.getElementById('subRow');
                    if (currentSource === 'official') {
                        modeRow.style.display = 'flex';
                        subRow.style.display = 'flex';
                        const activeMode = document.querySelector('.sort-btn[data-mode].active');
                        if (activeMode) {
                            const mode = activeMode.dataset.mode;
                            document.getElementById('timeOptions').classList.toggle('show', mode === 'time');
                            document.getElementById('typeOptions').classList.toggle('show', mode === 'type');
                        } else {
                            document.querySelector('.sort-btn[data-mode="time"]').classList.add('active');
                            document.getElementById('timeOptions').classList.add('show');
                            document.getElementById('typeOptions').classList.remove('show');
                        }
                    } else {
                        modeRow.style.display = 'none';
                        subRow.style.display = 'none';
                        // 加载粉丝数据（如果未加载）
                        if (fansList.length === 0) {
                            fetchFansData().then(() => applySortAndRender());
                        }
                    }
                    applySortAndRender();
                });
            });

            // ============================================================
            // 8. 置顶管理
            // ============================================================
            debugToggle.addEventListener('click', () => {
                passwordModal.classList.add('active');
                passwordInput.value = '';
                passwordError.style.display = 'none';
                passwordInput.focus();
            });

            function closePasswordModal() {
                passwordModal.classList.remove('active');
            }
            passwordCloseBtn.addEventListener('click', closePasswordModal);
            passwordCancelBtn.addEventListener('click', closePasswordModal);
            passwordModal.addEventListener('click', (e) => {
                if (e.target === passwordModal) closePasswordModal();
            });

            passwordConfirmBtn.addEventListener('click', handlePassword);
            passwordInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handlePassword();
            });

            function handlePassword() {
                const input = passwordInput.value.trim();
                if (input === ADMIN_PASSWORD) {
                    closePasswordModal();
                    openAdminPanel();
                } else {
                    passwordError.style.display = 'block';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            }

            async function openAdminPanel() {
                await fetchPinnedList();
                adminFileList = rawImages.map(item => {
                    const fileName = item.src.split('/').pop();
                    return { ...item, fileName, pinned: pinnedFiles.includes(fileName) };
                });
                adminFileList.sort((a, b) => {
                    const aPinned = a.pinned;
                    const bPinned = b.pinned;
                    if (aPinned && bPinned) {
                        return pinnedFiles.indexOf(a.fileName) - pinnedFiles.indexOf(b.fileName);
                    }
                    if (aPinned) return -1;
                    if (bPinned) return 1;
                    return 0;
                });
                renderAdminList();
                adminModal.classList.add('active');
            }

            function renderAdminList() {
                adminBody.innerHTML = '';
                adminFileList.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    div.draggable = true;
                    div.dataset.index = index;

                    const thumbContainer = document.createElement('div');
                    thumbContainer.className = 'thumbnail';
                    if (item.isVideoOnly) {
                        const video = document.createElement('video');
                        video.src = item.video;
                        video.muted = true;
                        video.playsInline = true;
                        video.preload = 'metadata';
                        video.setAttribute('playsinline', '');
                        video.load();
                        thumbContainer.appendChild(video);
                    } else {
                        const img = document.createElement('img');
                        img.src = item.src;
                        img.alt = item.alt;
                        img.loading = 'lazy';
                        thumbContainer.appendChild(img);
                    }
                    div.appendChild(thumbContainer);

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'file-name';
                    nameSpan.textContent = item.fileName;
                    div.appendChild(nameSpan);

                    const check = document.createElement('input');
                    check.type = 'checkbox';
                    check.className = 'pin-check';
                    check.checked = item.pinned;
                    check.addEventListener('change', (e) => {
                        item.pinned = e.target.checked;
                        if (!item.pinned) {
                            const idx = pinnedFiles.indexOf(item.fileName);
                            if (idx !== -1) pinnedFiles.splice(idx, 1);
                        } else {
                            if (!pinnedFiles.includes(item.fileName)) {
                                pinnedFiles.push(item.fileName);
                            }
                        }
                        adminFileList.sort((a, b) => {
                            const aP = a.pinned;
                            const bP = b.pinned;
                            if (aP && bP) {
                                return pinnedFiles.indexOf(a.fileName) - pinnedFiles.indexOf(b.fileName);
                            }
                            if (aP) return -1;
                            if (bP) return 1;
                            return 0;
                        });
                        renderAdminList();
                    });
                    div.appendChild(check);

                    const dragHandle = document.createElement('span');
                    dragHandle.className = 'drag-handle';
                    dragHandle.textContent = '⠿';
                    div.appendChild(dragHandle);

                    div.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('text/plain', index);
                        div.style.opacity = '0.5';
                    });
                    div.addEventListener('dragend', () => {
                        div.style.opacity = '1';
                    });
                    div.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        const targetIndex = parseInt(div.dataset.index);
                        const dragIndex = parseInt(e.dataTransfer.getData('text/plain'));
                        if (dragIndex !== targetIndex) {
                            const draggedItem = adminFileList.splice(dragIndex, 1)[0];
                            adminFileList.splice(targetIndex, 0, draggedItem);
                            renderAdminList();
                        }
                    });

                    adminBody.appendChild(div);
                });
            }

            function closeAdminModal() {
                adminModal.classList.remove('active');
            }
            adminCloseBtn.addEventListener('click', closeAdminModal);
            adminCancelBtn.addEventListener('click', closeAdminModal);
            adminModal.addEventListener('click', (e) => {
                if (e.target === adminModal) closeAdminModal();
            });

            adminSaveBtn.addEventListener('click', async () => {
                const newPinned = adminFileList.filter(item => item.pinned).map(item => item.fileName);
                try {
                    const res = await fetch('/api/set-pinned', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pinned: newPinned, password: ADMIN_PASSWORD })
                    });
                    if (!res.ok) throw new Error('保存失败');
                    const result = await res.json();
                    if (result.success) {
                        pinnedFiles = newPinned;
                        closeAdminModal();
                        applySortAndRender();
                        console.log('✅ 置顶已更新');
                    } else {
                        alert('保存失败：' + (result.error || '未知错误'));
                    }
                } catch (error) {
                    console.error('保存置顶失败:', error);
                    alert('保存置顶失败，请检查网络或稍后重试。');
                }
            });

            adminToFansBtn.addEventListener('click', () => {
                closeAdminModal();
                fansAdminModal.classList.add('active');
                loadFansList();
            });

            fansToAdminBtn.addEventListener('click', () => {
                fansAdminModal.classList.remove('active');
                adminModal.classList.add('active');
            });

            // ============================================================
            // 9. 粉丝作品管理（含快速上传）
            // ============================================================
            // 上传事件
            uploadDropZone.addEventListener('click', () => fileInput.click());

            uploadDropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadDropZone.style.background = 'var(--bg-divider)';
            });
            uploadDropZone.addEventListener('dragleave', () => {
                uploadDropZone.style.background = 'transparent';
            });
            uploadDropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadDropZone.style.background = 'transparent';
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFansUpload(files[0]);
                }
            });

            fileInput.addEventListener('change', () => {
                if (fileInput.files.length > 0) {
                    handleFansUpload(fileInput.files[0]);
                }
                fileInput.value = '';
            });

            async function handleFansUpload(file) {
                const maxSize = 4 * 1024 * 1024;
                if (file.size > maxSize) {
                    alert('文件大小超过4MB限制，请压缩后重试');
                    return;
                }
                const validTypes = ['image/jpeg', 'image/png', 'image/webp', 'video/mp4', 'video/quicktime', 'video/x-m4v'];
                if (!validTypes.includes(file.type)) {
                    alert('不支持的文件格式，请上传图片或视频');
                    return;
                }
                uploadProgress.style.display = 'block';
                uploadProgressBar.style.width = '0%';
                uploadStatus.textContent = '准备上传...';

                const formData = new FormData();
                formData.append('file', file);
                formData.append('password', ADMIN_PASSWORD);

                try {
                    const response = await fetch('/api/fans/upload', {
                        method: 'POST',
                        body: formData,
                    });
                    const result = await response.json();
                    if (result.success) {
                        uploadProgressBar.style.width = '100%';
                        uploadStatus.textContent = '✅ 上传成功！';
                        const url = result.url;
                        const isVideo = file.type.startsWith('video/');
                        if (isVideo) {
                            fansFormVideo.value = url;
                        } else {
                            fansFormSrc.value = url;
                        }
                        const baseName = file.name.split('.')[0];
                        if (!fansFormCreator.value) {
                            fansFormCreator.value = `@${baseName}`;
                        }
                        if (!fansFormDate.value) {
                            fansFormDate.value = new Date().toISOString().slice(0, 10);
                        }
                        fansFormModal.classList.add('active');
                        setTimeout(() => {
                            uploadProgress.style.display = 'none';
                        }, 1500);
                    } else {
                        alert('上传失败：' + (result.error || '未知错误'));
                        uploadProgress.style.display = 'none';
                    }
                } catch (error) {
                    console.error('上传错误:', error);
                    alert('上传失败，请检查网络');
                    uploadProgress.style.display = 'none';
                }
            }

            // 粉丝管理列表加载
            async function loadFansList() {
                try {
                    const res = await fetch('/api/fans/list', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: ADMIN_PASSWORD })
                    });
                    const result = await res.json();
                    if (result.success) {
                        fansList = result.data || [];
                        renderFansAdminList();
                    } else {
                        alert('加载粉丝作品失败：' + (result.error || '未知错误'));
                    }
                } catch (error) {
                    console.error('加载粉丝作品网络错误:', error);
                    alert('加载粉丝作品失败，请检查网络');
                }
            }

            function renderFansAdminList() {
                const container = document.getElementById('fansListContainer');
                container.innerHTML = '';
                if (fansList.length === 0) {
                    container.innerHTML = `
                        <p style="text-align:center; color:var(--text-muted); padding:2rem 0;">
                            暂无粉丝作品，点击「新增作品」添加
                        </p>
                    `;
                    return;
                }
                const sorted = [...fansList].reverse();
                sorted.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    div.style.cursor = 'default';

                    const thumb = document.createElement('div');
                    thumb.className = 'thumbnail';
                    const img = document.createElement('img');
                    img.src = item.src;
                    img.alt = item.id;
                    img.loading = 'lazy';
                    thumb.appendChild(img);
                    div.appendChild(thumb);

                    const info = document.createElement('span');
                    info.className = 'file-name';
                    info.style.fontSize = '0.8rem';
                    info.innerHTML = `
                        <strong>${item.creatorId}</strong>
                        <span style="color:var(--text-muted); margin-left:0.5rem;">${item.category}</span>
                        <span style="color:var(--text-muted); margin-left:0.5rem; font-size:0.7rem;">${item.date}</span>
                        ${item.isFeatured ? '⭐' : ''}
                        ${!item.isActive ? '🚫' : ''}
                    `;
                    div.appendChild(info);

                    const actions = document.createElement('div');
                    actions.style.cssText = 'display:flex; gap:0.3rem; flex-shrink:0;';

                    const featBtn = document.createElement('button');
                    featBtn.textContent = item.isFeatured ? '⭐' : '☆';
                    featBtn.style.cssText =
                        `background:none; border:none; cursor:pointer; font-size:1.1rem; color:${item.isFeatured ? '#f59e0b' : 'var(--text-muted)'};`;
                    featBtn.title = '切换精选';
                    featBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        await toggleFansFeatured(item.id);
                    });
                    actions.appendChild(featBtn);

                    const activeBtn = document.createElement('button');
                    activeBtn.textContent = item.isActive ? '✅' : '🚫';
                    activeBtn.style.cssText = 'background:none; border:none; cursor:pointer; font-size:1.1rem;';
                    activeBtn.title = '切换上下架';
                    activeBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        await toggleFansActive(item.id);
                    });
                    actions.appendChild(activeBtn);

                    const editBtn = document.createElement('button');
                    editBtn.textContent = '✏️';
                    editBtn.style.cssText = 'background:none; border:none; cursor:pointer; font-size:1.1rem;';
                    editBtn.title = '编辑';
                    editBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openFansForm(item);
                    });
                    actions.appendChild(editBtn);

                    const delBtn = document.createElement('button');
                    delBtn.textContent = '🗑️';
                    delBtn.style.cssText = 'background:none; border:none; cursor:pointer; font-size:1.1rem; color:#e0786a;';
                    delBtn.title = '删除';
                    delBtn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        if (confirm(`确定要删除 "${item.creatorId}" 的作品吗？`)) {
                            await deleteFansItem(item.id);
                        }
                    });
                    actions.appendChild(delBtn);

                    div.appendChild(actions);
                    container.appendChild(div);
                });
            }

            async function toggleFansFeatured(id) {
                try {
                    const res = await fetch('/api/fans/toggle-featured', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, password: ADMIN_PASSWORD })
                    });
                    const result = await res.json();
                    if (result.success) {
                        await loadFansList();
                    } else {
                        alert('操作失败：' + (result.error || '未知错误'));
                    }
                } catch (error) {
                    console.error('切换精选失败:', error);
                    alert('网络错误');
                }
            }

            async function toggleFansActive(id) {
                try {
                    const res = await fetch('/api/fans/toggle-active', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, password: ADMIN_PASSWORD })
                    });
                    const result = await res.json();
                    if (result.success) {
                        await loadFansList();
                    } else {
                        alert('操作失败：' + (result.error || '未知错误'));
                    }
                } catch (error) {
                    console.error('切换上下架失败:', error);
                    alert('网络错误');
                }
            }

            async function deleteFansItem(id) {
                try {
                    const res = await fetch('/api/fans/delete', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id, password: ADMIN_PASSWORD })
                    });
                    const result = await res.json();
                    if (result.success) {
                        await loadFansList();
                    } else {
                        alert('删除失败：' + (result.error || '未知错误'));
                    }
                } catch (error) {
                    console.error('删除失败:', error);
                    alert('网络错误');
                }
            }

            function openFansForm(item) {
                if (item) {
                    fansFormTitle.textContent = '✏️ 编辑粉丝作品';
                    fansFormId.value = item.id;
                    fansFormType.value = item.type || 'photo';
                    fansFormSrc.value = item.src || '';
                    fansFormVideo.value = item.video || '';
                    fansFormPoster.value = item.poster || '';  // 填充 poster
                    fansFormCreator.value = item.creatorId || '';
                    fansFormMessage.value = item.message || '';
                    fansFormCategory.value = item.category || '手绘插画';
                    fansFormDate.value = item.date || '';
                    fansFormFeatured.checked = item.isFeatured || false;
                    fansFormActive.checked = item.isActive !== false;
                } else {
                    fansFormTitle.textContent = '➕ 新增粉丝作品';
                    fansFormId.value = '';
                    fansFormType.value = 'photo';
                    fansFormSrc.value = '';
                    fansFormVideo.value = '';
                    fansFormPoster.value = '';
                    fansFormCreator.value = '';
                    fansFormMessage.value = '';
                    fansFormCategory.value = '手绘插画';
                    fansFormDate.value = new Date().toISOString().slice(0, 10);
                    fansFormFeatured.checked = false;
                    fansFormActive.checked = true;
                }
                fansFormModal.classList.add('active');
            }

            function closeFansForm() {
                fansFormModal.classList.remove('active');
            }

            async function saveFansForm() {
                const id = fansFormId.value;
                const data = {
                    type: fansFormType.value,
                    src: fansFormSrc.value.trim(),
                    video: fansFormVideo.value.trim(),
                    poster: fansFormPoster.value.trim(), // 新增
                    creatorId: fansFormCreator.value.trim(),
                    message: fansFormMessage.value.trim(),
                    category: fansFormCategory.value,
                    date: fansFormDate.value,
                    isFeatured: fansFormFeatured.checked,
                    isActive: fansFormActive.checked,
                    password: ADMIN_PASSWORD,
                };
                if (!data.src || !data.creatorId || !data.category) {
                    alert('请填写完整信息（图片URL、粉丝ID、分类为必填）');
                    return;
                }
                const url = id ? '/api/fans/edit' : '/api/fans/add';
                if (id) data.id = id;

                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    const result = await res.json();
                    if (result.success) {
                        closeFansForm();
                        await loadFansList();
                    } else {
                        alert('保存失败：' + (result.error || '未知错误'));
                    }
                } catch (error) {
                    console.error('保存失败:', error);
                    alert('网络错误');
                }
            }

            fansAdminAddBtn.addEventListener('click', () => {
                openFansForm(null);
            });

            fansAdminCloseBtn.addEventListener('click', () => {
                fansAdminModal.classList.remove('active');
            });
            fansAdminCancelBtn.addEventListener('click', () => {
                fansAdminModal.classList.remove('active');
            });
            fansAdminModal.addEventListener('click', (e) => {
                if (e.target === fansAdminModal) fansAdminModal.classList.remove('active');
            });

            fansFormCloseBtn.addEventListener('click', closeFansForm);
            fansFormCancelBtn.addEventListener('click', closeFansForm);
            fansFormModal.addEventListener('click', (e) => {
                if (e.target === fansFormModal) closeFansForm();
            });
            fansFormSaveBtn.addEventListener('click', saveFansForm);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && fansFormModal.classList.contains('active')) {
                    if (e.target.tagName !== 'TEXTAREA') {
                        e.preventDefault();
                        saveFansForm();
                    }
                }
            });

            // ============================================================
            // 10. 启动
            // ============================================================
            loadImages();
            updateVisitCount();
        })();
    </script>

</body>
