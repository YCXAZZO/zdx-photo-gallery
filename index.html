<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>黛溪的照片墙｜β内测</title>

    <!-- ===== 预连接与 DNS 预解析 ===== -->
    <link rel="preconnect" href="https://img.ycxazzo.top" />
    <link rel="dns-prefetch" href="https://img.ycxazzo.top" />

    <!-- ===== 预加载背景音乐 ===== -->
    <link rel="preload" href="https://img.ycxazzo.top/music/BGM.mp3" as="audio" />

    <!-- ===== 字体 ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />

    <!-- ===== Swiper CSS ===== -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        /* ===== CSS 变量（浅色模式默认） ===== */
        :root {
            --bg-body: #fcf8f6;
            --bg-card: #ffffff;
            --bg-controls: #ffffff;
            --bg-modal: #ffffff;
            --bg-divider: #fcf8f6;
            --text-primary: #3d2c2a;
            --text-secondary: #8a7773;
            --text-muted: #b5a39e;
            --border-light: #e8e0dc;
            --border-divider: #e0d6d2;
            --shadow-card: rgba(0, 0, 0, 0.04);
            --shadow-hover: rgba(0, 0, 0, 0.08);
            --shadow-modal: rgba(0, 0, 0, 0.3);
            --accent: #f2cdc4;
            --accent-hover: #e8bcb2;
            --tag-bg: #fcf8f6;
            --bgm-color: #3d2c2a;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #1a1614;
                --bg-card: #2a2522;
                --bg-controls: #2a2522;
                --bg-modal: #2a2522;
                --bg-divider: #1a1614;
                --text-primary: #f0e8e4;
                --text-secondary: #b5a39e;
                --text-muted: #8a7773;
                --border-light: #3d3530;
                --border-divider: #4a403a;
                --shadow-card: rgba(0, 0, 0, 0.2);
                --shadow-hover: rgba(0, 0, 0, 0.4);
                --shadow-modal: rgba(0, 0, 0, 0.6);
                --accent: #c4a89e;
                --accent-hover: #b3968a;
                --tag-bg: #1a1614;
                --bgm-color: #f0e8e4;
            }

            .section-divider .label {
                background: var(--bg-divider) !important;
            }
        }

        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            padding: 2rem 1.5rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }

        .gallery-wrapper {
            max-width: 1200px;
            width: 100%;
        }

        /* ===== 标题 ===== */
        .gallery-header {
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .gallery-header h1 {
            font-size: 2.6rem;
            font-weight: 400;
            color: var(--text-primary);
        }

        .gallery-header .subtitle {
            font-size: 1.4rem;
            color: var(--text-secondary);
            margin-top: 0.3rem;
        }

        .gallery-header .subtitle .heart {
            color: #e0786a;
            display: inline-block;
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }

        .gallery-header .hint {
            margin-top: 0.8rem;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        /* ===== 背景音乐图标 ===== */
        .bgm-toggle {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            z-index: 10000;
            width: 36px;
            height: 36px;
            border: none;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
            color: var(--bgm-color);
            user-select: none;
            outline: none;
            padding: 0;
            line-height: 1;
        }

        .bgm-toggle:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        }

        .bgm-toggle:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .bgm-toggle .icon {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .bgm-toggle .icon.playing {
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .bgm-toggle .icon.paused {
            animation: none;
        }

        .bgm-toggle .icon.muted {
            opacity: 0.4;
        }

        /* 响应式调整 */
        @media (max-width: 640px) {
            .bgm-toggle {
                top: 1rem;
                right: 1rem;
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
        }

        /* ===== 排序控制栏（三行） ===== */
        .sort-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin: 0.5rem 0 1.8rem;
            padding: 0.8rem 1.5rem;
            background: var(--bg-controls);
            border-radius: 40px;
            box-shadow: 0 2px 12px var(--shadow-card);
            transition: background 0.3s, box-shadow 0.3s;
        }

        .sort-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.5rem 1rem;
            width: 100%;
        }

        .sort-row .label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .sort-row .divider {
            width: 1px;
            height: 24px;
            background: var(--border-divider);
        }

        .sub-options {
            display: none;
        }

        .sub-options.show {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .sort-btn {
            background: transparent;
            border: 1px solid var(--border-divider);
            padding: 0.35rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            outline: none;
        }

        .sort-btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .sort-btn:hover {
            background: var(--bg-divider);
        }

        .sort-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--text-primary);
            font-weight: 500;
        }

        /* ===== 网格 ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.2rem;
            justify-content: center;
        }

        /* ===== 分割线样式 ===== */
        .section-divider {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 0 0.4rem 0;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 0.4rem;
            outline: none;
        }

        .section-divider:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .section-divider:hover {
            opacity: 0.7;
        }

        .section-divider .line {
            flex: 1;
            height: 1px;
            background: var(--border-divider);
        }

        .section-divider .label {
            display: flex;
            align-items: baseline;
            gap: 0.3rem;
            white-space: nowrap;
            padding: 0 0.5rem;
            background: var(--bg-divider);
            transition: background 0.3s;
        }

        .section-divider .label .zh {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .section-divider .label .en {
            font-weight: 400;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .section-divider .toggle-icon {
            font-size: 0.8rem;
            color: var(--text-muted);
            transition: transform 0.3s ease;
            margin-left: 0.2rem;
        }

        .section-divider .toggle-icon.collapsed {
            transform: rotate(-90deg);
        }

        .section-items {
            display: contents;
        }

        .section-items.collapsed {
            display: none;
        }

        /* ===== 网格卡片 ===== */
        .grid-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 24px var(--shadow-card);
            background: var(--bg-card);
            cursor: pointer;
            aspect-ratio: 4 / 5;
            transition: transform 0.25s, box-shadow 0.3s, background 0.3s;
            outline: none;
        }

        .grid-item:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .grid-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 36px var(--shadow-hover);
        }

        .grid-item .media-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .grid-item .media-wrapper img,
        .grid-item .media-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* ===== 图片占位背景色 ===== */
        .grid-item .media-wrapper img {
            background-color: #e8e0dc;
        }

        .grid-item .media-wrapper video {
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .grid-item .media-wrapper video.active {
            opacity: 1;
        }

        .grid-item .media-wrapper video.visible {
            opacity: 1;
        }

        /* ===== 灯箱 ===== */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 22, 20, 0.85);
            backdrop-filter: blur(12px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            padding: 1.5rem;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .swiper-container {
            width: 100%;
            max-width: 90vw;
            max-height: 80vh;
            height: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            background: #1a1a1a;
        }

        .swiper-zoom-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .swiper-zoom-container img,
        .swiper-zoom-container video {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        .swiper-slide {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
        }

        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
            z-index: 10001;
            transition: background 0.25s;
            outline: none;
        }

        .nav-btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .nav-btn.prev {
            left: 1.5rem;
        }

        .nav-btn.next {
            right: 1.5rem;
        }

        .nav-btn.swiper-button-disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .close-btn {
            position: fixed;
            top: 1.8rem;
            right: 2rem;
            z-index: 10002;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            border: none;
            border-radius: 60px;
            width: 50px;
            height: 50px;
            font-size: 1.8rem;
            color: #fff;
            cursor: pointer;
            transition: background 0.25s;
            outline: none;
        }

        .close-btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .close-btn:hover {
            background: rgba(0, 0, 0, 0.55);
        }

        .counter {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(6px);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10001;
            font-size: 0.95rem;
        }

        /* ===== 返回按钮 ===== */
        .back-home {
            margin-top: 3rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--accent);
            color: var(--text-primary);
            padding: 0.75rem 2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.25s, transform 0.2s, color 0.3s;
            box-shadow: 0 4px 12px rgba(242, 205, 196, 0.3);
            outline: none;
        }

        .back-home:focus-visible {
            outline: 2px solid var(--text-primary);
            outline-offset: 2px;
        }

        .back-home:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* ===== 调试按钮 ===== */
        .debug-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 10010;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-divider);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, background 0.2s;
            outline: none;
            color: var(--text-secondary);
            user-select: none;
        }

        .debug-toggle:hover {
            background: var(--bg-card);
            transform: scale(1.05);
        }

        .debug-toggle:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* ===== 模态框 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 20000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: var(--bg-modal);
            border-radius: 28px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px var(--shadow-modal);
            overflow: hidden;
            transition: background 0.3s;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 1.8rem;
            border-bottom: 1px solid var(--border-light);
        }

        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .modal-close-btn {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
            padding: 0 0.4rem;
        }

        .modal-close-btn:hover {
            color: var(--text-primary);
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.8rem;
        }

        .modal-body .file-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.5rem 0.4rem;
            border-bottom: 1px solid var(--border-light);
            cursor: grab;
            transition: background 0.15s;
        }

        .modal-body .file-item:hover {
            background: var(--bg-divider);
        }

        .modal-body .file-item:active {
            cursor: grabbing;
        }

        .modal-body .file-item .thumbnail {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--bg-divider);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body .file-item .thumbnail img,
        .modal-body .file-item .thumbnail video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-body .file-item .file-name {
            flex: 1;
            font-size: 0.9rem;
            color: var(--text-primary);
            word-break: break-word;
        }

        .modal-body .file-item .pin-check {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
        }

        .modal-body .file-item .drag-handle {
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: grab;
            user-select: none;
        }

        .modal-footer {
            padding: 1rem 1.8rem 1.5rem;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
        }

        .modal-footer .btn-primary {
            background: var(--accent);
            border: none;
            padding: 0.5rem 1.6rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.2s;
        }

        .modal-footer .btn-primary:hover {
            background: var(--accent-hover);
        }

        .modal-footer .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-divider);
            padding: 0.5rem 1.6rem;
            border-radius: 40px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: background 0.2s;
        }

        .modal-footer .btn-secondary:hover {
            background: var(--bg-divider);
        }

        .password-box {
            max-width: 360px;
        }

        .password-box input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border-divider);
            border-radius: 40px;
            font-size: 1rem;
            margin-bottom: 1rem;
            outline: none;
            font-family: inherit;
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .password-box input:focus {
            border-color: var(--accent);
        }

        .password-box .error-msg {
            color: #e0786a;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            display: none;
        }

        /* ===== 访客计数 ===== */
        .visit-counter {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* ===== 素材统计 ===== */
        .stats-counter {
            text-align: center;
            margin-top: 0.3rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        .stats-counter .stat-item {
            display: inline-block;
            margin: 0 0.4rem;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            body {
                padding: 1.2rem 0.8rem 2rem;
            }

            .gallery-header h1 {
                font-size: 1.9rem;
            }

            .sort-controls {
                padding: 0.6rem 0.8rem;
                gap: 0.4rem;
            }

            .sort-row {
                gap: 0.3rem 0.6rem;
            }

            .sort-btn {
                font-size: 0.75rem;
                padding: 0.25rem 0.7rem;
            }

            .sort-row .label {
                font-size: 0.8rem;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 0.8rem;
            }

            .section-divider .label .zh {
                font-size: 0.85rem;
            }

            .section-divider .label .en {
                font-size: 0.65rem;
            }

            .nav-btn {
                width: 44px;
                height: 44px;
                font-size: 1.4rem;
            }

            .nav-btn.prev {
                left: 0.6rem;
            }

            .nav-btn.next {
                right: 0.6rem;
            }

            .close-btn {
                top: 1rem;
                right: 1rem;
                width: 44px;
                height: 44px;
                font-size: 1.5rem;
            }

            .counter {
                bottom: 1.5rem;
                font-size: 0.8rem;
                padding: 0.3rem 1rem;
            }

            .debug-toggle {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
                bottom: 1.2rem;
                right: 1.2rem;
            }

            .modal-box {
                max-width: 100%;
                border-radius: 20px;
            }

            .modal-body .file-item .thumbnail {
                width: 36px;
