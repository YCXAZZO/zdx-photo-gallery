<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>黛溪的照片墙</title>

    <!-- ===== 字体 ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />

    <!-- ===== Swiper CSS ===== -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #fcf8f6;
            min-height: 100vh;
            padding: 2rem 1.5rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gallery-wrapper {
            max-width: 1200px;
            width: 100%;
        }

        /* ===== 标题 ===== */
        .gallery-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .gallery-header h1 {
            font-size: 2.6rem;
            font-weight: 400;
            color: #3d2c2a;
        }

        .gallery-header .subtitle {
            font-size: 1.1rem;
            color: #8a7773;
            margin-top: 0.3rem;
        }

        .gallery-header .subtitle .heart {
            color: #e0786a;
            display: inline-block;
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }
        }

        .gallery-header .hint {
            margin-top: 0.8rem;
            font-size: 0.9rem;
            color: #b5a39e;
        }

        /* ===== 排序控制栏 ===== */
        .sort-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.5rem 1rem;
            margin: 0.5rem 0 1.8rem;
            padding: 0.8rem 1.5rem;
            background: #fff;
            border-radius: 40px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .sort-controls .label {
            font-size: 0.9rem;
            color: #8a7773;
            font-weight: 500;
        }

        .sort-btn {
            background: transparent;
            border: 1px solid #e0d6d2;
            padding: 0.35rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #5a4a46;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .sort-btn:hover {
            background: #f5ece8;
        }

        .sort-btn.active {
            background: #f2cdc4;
            border-color: #f2cdc4;
            color: #3d2c2a;
            font-weight: 500;
        }

        .sort-divider {
            width: 1px;
            height: 24px;
            background: #e0d6d2;
        }

        .sort-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* 子选项默认隐藏 */
        .sub-options {
            display: none;
        }
        .sub-options.show {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ===== 网格 ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.2rem;
            justify-content: center;
        }

        .grid-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            background: #fff;
            cursor: pointer;
            aspect-ratio: 4 / 5;
            transition: transform 0.25s, box-shadow 0.3s;
        }

        .grid-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.08);
        }

        .grid-item .media-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .grid-item .media-wrapper img,
        .grid-item .media-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .grid-item .media-wrapper video {
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .grid-item .media-wrapper video.active {
            opacity: 1;
        }

        /* ===== 灯箱 (Swiper) ===== */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 22, 20, 0.85);
            backdrop-filter: blur(12px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            padding: 1.5rem;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .swiper-container {
            width: 100%;
            max-width: 90vw;
            max-height: 80vh;
            height: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            background: #1a1a1a;
        }

        .swiper-slide {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
        }

        .swiper-slide img,
        .swiper-slide video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
        }

        .swiper-slide video {
            background: #000;
        }

        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
            z-index: 10001;
            transition: background 0.25s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .nav-btn.prev {
            left: 1.5rem;
        }
        .nav-btn.next {
            right: 1.5rem;
        }

        .nav-btn.swiper-button-disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .close-btn {
            position: fixed;
            top: 1.8rem;
            right: 2rem;
            z-index: 10002;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            border: none;
            border-radius: 60px;
            width: 50px;
            height: 50px;
            font-size: 1.8rem;
            color: #fff;
            cursor: pointer;
            transition: background 0.25s;
        }

        .close-btn:hover {
            background: rgba(0, 0, 0, 0.55);
        }

        .counter {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(6px);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10001;
            font-size: 0.95rem;
        }

        /* ===== 返回按钮 ===== */
        .back-home {
            margin-top: 3rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #f2cdc4;
            color: #3d2c2a;
            padding: 0.75rem 2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.25s, transform 0.2s;
            box-shadow: 0 4px 12px rgba(242, 205, 196, 0.3);
        }

        .back-home:hover {
            background: #e8bcb2;
            transform: translateY(-2px);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            body {
                padding: 1.2rem 0.8rem 2rem;
            }
            .gallery-header h1 {
                font-size: 1.9rem;
            }
            .sort-controls {
                gap: 0.3rem 0.6rem;
                padding: 0.4rem 0.8rem;
                flex-direction: column;
                align-items: stretch;
            }
            .sort-group {
                justify-content: center;
                flex-wrap: wrap;
            }
            .sub-options.show {
                justify-content: center;
                flex-wrap: wrap;
            }
            .sort-btn {
                font-size: 0.75rem;
                padding: 0.25rem 0.7rem;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 0.8rem;
            }
            .nav-btn {
                width: 44px;
                height: 44px;
                font-size: 1.4rem;
            }
            .nav-btn.prev {
                left: 0.6rem;
            }
            .nav-btn.next {
                right: 0.6rem;
            }
            .close-btn {
                top: 1rem;
                right: 1rem;
                width: 44px;
                height: 44px;
                font-size: 1.5rem;
            }
            .counter {
                bottom: 1.5rem;
                font-size: 0.8rem;
                padding: 0.3rem 1rem;
            }
        }

        @media (max-width: 400px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 0.6rem;
            }
        }
    </style>
</head>

<body>

    <div class="gallery-wrapper">
        <header class="gallery-header">
            <h1>#黛机时刻 </h1>
            <p class="subtitle">​​Daisy’s Photo Gallery​ <span class="heart">❤️</span></p>
            <p class="hint">点击任意照片放大 · 左右滑动浏览<br>「Beta阶段 仅供预览」</p>
        </header>

        <!-- ===== 排序控制栏 ===== -->
        <div class="sort-controls">
            <!-- 模式切换 -->
            <div class="sort-group">
                <span class="label">模式：</span>
                <button class="sort-btn active" data-mode="time">时间轴</button>
                <button class="sort-btn" data-mode="type">类型</button>
            </div>

            <span class="sort-divider"></span>

            <!-- 时间轴子选项 -->
            <div class="sub-options show" id="timeOptions">
                <span class="label">方向：</span>
                <button class="sort-btn active" data-sub="old">旧在前</button>
                <button class="sort-btn" data-sub="new">新在前</button>
            </div>

            <!-- 类型子选项 -->
            <div class="sub-options" id="typeOptions">
                <span class="label">分组：</span>
                <button class="sort-btn active" data-sub="photo">Photo 在前</button>
                <button class="sort-btn" data-sub="live">Live 在前</button>
            </div>
        </div>

        <div class="grid" id="photoGrid"></div>

        <div style="display: flex; justify-content: center; width: 100%;">
            <a href="https://zdx-role-test.ycxazzo.top" target="_blank" class="back-home">
                ← 回到人格测试
            </a>
        </div>
    </div>

    <!-- ===== 灯箱 ===== -->
    <div class="lightbox" id="lightbox">
        <button class="close-btn" id="closeBtn">✕</button>
        <button class="nav-btn prev" id="prevBtn">‹</button>
        <button class="nav-btn next" id="nextBtn">›</button>
        <div class="swiper-container" id="swiperContainer">
            <div class="swiper-wrapper" id="swiperWrapper"></div>
        </div>
        <div class="counter" id="counter">1 / 1</div>
    </div>

    <!-- ===== 引入 Swiper ===== -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        (function() {
            'use strict';

            // ============================================================
            // 1. DOM 引用
            // ============================================================
            const grid = document.getElementById('photoGrid');
            const lightbox = document.getElementById('lightbox');
            const closeBtn = document.getElementById('closeBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const counter = document.getElementById('counter');
            const swiperWrapper = document.getElementById('swiperWrapper');
            const swiperContainer = document.getElementById('swiperContainer');

            let swiperInstance = null;
            let currentIndex = 0;
            let rawImages = []; // 原始数据（来自 data.json）
            let IMAGES = []; // 当前显示的排序后数据

            // ============================================================
            // 2. 加载 data.json
            // ============================================================
            async function loadImages() {
                try {
                    const response = await fetch('data.json');
                    if (!response.ok) throw new Error('data.json 加载失败');
                    const data = await response.json();
                    rawImages = data;
                    if (!rawImages.length) {
                        grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#8a7773; padding:3rem 0;">暂无照片，请添加图片。</p>';
                        return;
                    }
                    // 初始应用排序
                    applySortAndRender();
                    console.log('📸 照片墙已加载，图片数量:', rawImages.length);
                } catch (error) {
                    console.error('加载图片数据失败:', error);
                    grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#e0786a; padding:3rem 0;">⚠️ 数据加载失败，请检查部署。</p>';
                }
            }

            // ============================================================
            // 3. 排序与渲染
            // ============================================================
            function applySortAndRender() {
                // 获取当前选中的模式
                const activeMode = document.querySelector('.sort-btn[data-mode].active');
                if (!activeMode) return;
                const mode = activeMode.dataset.mode; // 'time' 或 'type'

                // 获取该模式下的子选项
                const subContainer = mode === 'time' ? document.getElementById('timeOptions') : document.getElementById(
                'typeOptions');
                const activeSub = subContainer.querySelector('.sort-btn[data-sub].active');
                if (!activeSub) return;
                const subValue = activeSub.dataset.sub; // 'old'/'new' 或 'photo'/'live'

                console.log('🔀 模式:', mode, '子选项:', subValue);

                // 基于原始数据排序
                const sorted = [...rawImages];

                if (mode === 'time') {
                    // 按时间戳排序
                    sorted.sort((a, b) => {
                        const t1 = a.timestamp || 0;
                        const t2 = b.timestamp || 0;
                        return subValue === 'old' ? t1 - t2 : t2 - t1;
                    });
                } else { // type
                    const photos = sorted.filter(item => !item.video);
                    const lives = sorted.filter(item => item.video);
                    // 组内按时间升序（可固定，也可根据用户需求，但类型模式下没有方向选项，这里使用升序）
                    const sortByTime = (arr) => arr.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    sortByTime(photos);
                    sortByTime(lives);
                    // 合并
                    if (subValue === 'photo') {
                        sorted.splice(0, sorted.length, ...photos, ...lives);
                    } else { // live
                        sorted.splice(0, sorted.length, ...lives, ...photos);
                    }
                }

                IMAGES = sorted;
                renderGrid();

                // 如果灯箱打开，关闭它（因为顺序已变）
                if (lightbox.classList.contains('active')) {
                    closeLightbox();
                }
            }

            // ============================================================
            // 4. 渲染网格
            // ============================================================
            function renderGrid() {
                grid.innerHTML = '';
                IMAGES.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'grid-item';
                    div.setAttribute('role', 'button');
                    div.setAttribute('tabindex', '0');
                    div.setAttribute('aria-label', `查看图片 ${index + 1}: ${item.alt}`);

                    const wrapper = document.createElement('div');
                    wrapper.className = 'media-wrapper';

                    const img = document.createElement('img');
                    img.src = item.src;
                    img.alt = item.alt;
                    img.loading = 'lazy';
                    wrapper.appendChild(img);

                    if (item.video) {
                        const video = document.createElement('video');
                        video.src = item.video;
                        video.muted = true;
                        video.playsInline = true;
                        video.loop = true;
                        video.preload = 'metadata';
                        video.setAttribute('aria-hidden', 'true');
                        wrapper.appendChild(video);

                        div.addEventListener('mouseenter', () => {
                            video.classList.add('active');
                            video.play().catch(() => {});
                        });
                        div.addEventListener('mouseleave', () => {
                            video.classList.remove('active');
                            video.pause();
                            video.currentTime = 0;
                        });

                        let touchTimer = null;
                        div.addEventListener('touchstart', () => {
                            touchTimer = setTimeout(() => {
                                video.classList.add('active');
                                video.play().catch(() => {});
                            }, 300);
                        }, { passive: true });
                        div.addEventListener('touchend', () => {
                            clearTimeout(touchTimer);
                            video.classList.remove('active');
                            video.pause();
                            video.currentTime = 0;
                        }, { passive: true });
                        div.addEventListener('touchcancel', () => {
                            clearTimeout(touchTimer);
                            video.classList.remove('active');
                            video.pause();
                            video.currentTime = 0;
                        }, { passive: true });
                    }

                    div.appendChild(wrapper);

                    div.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openLightbox(index);
                    });
                    div.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            openLightbox(index);
                        }
                    });

                    grid.appendChild(div);
                });
            }

            // ============================================================
            // 5. 灯箱 (Swiper)
            // ============================================================
            function openLightbox(index) {
                if (!IMAGES.length) return;
                currentIndex = Math.min(index, IMAGES.length - 1);
                console.log('🖱️ 打开灯箱，目标索引:', currentIndex);
                buildSwiper(currentIndex);
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
                if (swiperInstance) {
                    document.querySelectorAll('.swiper-slide video').forEach(v => v.pause());
                    swiperInstance.destroy(true, true);
                    swiperInstance = null;
                }
                swiperWrapper.innerHTML = '';
            }

            function buildSwiper(initialSlide) {
                swiperWrapper.innerHTML = '';
                IMAGES.forEach((item) => {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';
                    if (item.video) {
                        const video = document.createElement('video');
                        video.src = item.video;
                        video.poster = item.src;
                        video.controls = true;
                        video.muted = true;
                        video.playsInline = true;
                        video.preload = 'metadata';
                        video.setAttribute('playsinline', '');
                        slide.appendChild(video);
                    } else {
                        const img = document.createElement('img');
                        img.src = item.src;
                        img.alt = item.alt;
                        slide.appendChild(img);
                    }
                    swiperWrapper.appendChild(slide);
                });

                if (swiperInstance) {
                    swiperInstance.destroy(true, true);
                    swiperInstance = null;
                }

                swiperInstance = new Swiper(swiperContainer, {
                    initialSlide: initialSlide,
                    slidesPerView: 1,
                    centeredSlides: true,
                    effect: 'fade',
                    fadeEffect: { crossFade: true },
                    speed: 400,
                    loop: false,
                    touchEventsTarget: 'container',
                    navigation: {
                        prevEl: prevBtn,
                        nextEl: nextBtn,
                    },
                    observer: true,
                    observeParents: true,
                    on: {
                        slideChangeTransitionEnd: function() {
                            const idx = this.activeIndex;
                            updateCounter(idx);
                            this.slides.forEach((slide, i) => {
                                const video = slide.querySelector('video');
                                if (video) {
                                    if (i === idx) {
                                        video.play().catch(() => {});
                                    } else {
                                        video.pause();
                                    }
                                }
                            });
                        },
                        init: function() {
                            this.navigation.update();
                            updateCounter(this.activeIndex);
                            const slide = this.slides[this.activeIndex];
                            if (slide) {
                                const video = slide.querySelector('video');
                                if (video) video.play().catch(() => {});
                            }
                        }
                    }
                });

                setTimeout(() => {
                    if (swiperInstance && swiperInstance.activeIndex !== initialSlide) {
                        swiperInstance.slideTo(initialSlide, 0);
                        updateCounter(initialSlide);
                    }
                }, 100);
            }

            function updateCounter(index) {
                counter.textContent = `${index + 1} / ${IMAGES.length}`;
            }

            // ============================================================
            // 6. 键盘事件
            // ============================================================
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;
                switch (e.key) {
                    case 'Escape':
                        closeLightbox();
                        e.preventDefault();
                        break;
                    case 'ArrowLeft':
                        if (swiperInstance) swiperInstance.slidePrev();
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                        if (swiperInstance) swiperInstance.slideNext();
                        e.preventDefault();
                        break;
                }
            });

            // ============================================================
            // 7. UI 事件绑定
            // ============================================================
            closeBtn.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });

            // ---- 模式切换 ----
            document.querySelectorAll('.sort-btn[data-mode]').forEach(btn => {
                btn.addEventListener('click', function() {
                    // 切换模式按钮 active
                    document.querySelectorAll('.sort-btn[data-mode]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    // 显示对应的子选项
                    const mode = this.dataset.mode;
                    document.getElementById('timeOptions').classList.toggle('show', mode === 'time');
                    document.getElementById('typeOptions').classList.toggle('show', mode === 'type');

                    // 重新排序
                    applySortAndRender();
                });
            });

            // ---- 子选项点击 ----
            document.querySelectorAll('.sub-options .sort-btn[data-sub]').forEach(btn => {
                btn.addEventListener('click', function() {
                    // 只切换当前子选项组内的 active
                    const parent = this.closest('.sub-options');
                    parent.querySelectorAll('.sort-btn[data-sub]').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    // 重新排序
                    applySortAndRender();
                });
            });

            // ============================================================
            // 8. 启动
            // ============================================================
            loadImages();
        })();
    </script>

</body>

</html>
