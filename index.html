<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>黛溪的照片墙</title>

    <!-- ===== 字体 ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />

    <style>
        /* ============================================================
                   1. 全局重置 & 基础
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fcf8f6;
            min-height: 100vh;
            padding: 2rem 1.5rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ============================================================
                   2. 容器 & 标题（更新）
                   ============================================================ */
        .gallery-wrapper {
            max-width: 1200px;
            width: 100%;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 2.8rem;
        }

        .gallery-header h1 {
            font-size: 2.6rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: #3d2c2a;
            font-family: 'Inter', serif;
            font-weight: 400;
        }

        .gallery-header .subtitle {
            font-size: 1.1rem;
            color: #8a7773;
            margin-top: 0.3rem;
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        .gallery-header .subtitle .heart {
            color: #e0786a;
            display: inline-block;
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.15);
            }
        }

        .gallery-header .hint {
            margin-top: 0.8rem;
            font-size: 0.9rem;
            color: #b5a39e;
            letter-spacing: 0.3px;
            font-weight: 400;
        }

        /* ============================================================
                   3. 图片网格
                   ============================================================ */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.2rem;
            justify-content: center;
        }

        .grid-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
            background: #fff;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            cursor: pointer;
            aspect-ratio: 4 / 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.08), 0 6px 12px rgba(0, 0, 0, 0.04);
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .grid-item:hover img {
            transform: scale(1.02);
        }

        /* ============================================================
                   4. Lightbox 遮罩层
                   ============================================================ */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 22, 20, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 1.5rem;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-image-wrap {
            position: relative;
            max-width: 90vw;
            max-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .lightbox-image-wrap img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            background: #fcf8f6;
            transition: transform 0.2s ease;
            user-select: none;
            -webkit-user-drag: none;
        }

        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
            transition: background 0.25s ease, transform 0.2s ease;
            z-index: 10001;
            user-select: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-50%) scale(1.05);
        }

        .nav-btn.prev {
            left: 1.5rem;
        }
        .nav-btn.next {
            right: 1.5rem;
        }

        .close-btn {
            position: fixed;
            top: 1.8rem;
            right: 2rem;
            z-index: 10002;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: none;
            border-radius: 60px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #fff;
            cursor: pointer;
            transition: background 0.25s ease, transform 0.2s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            font-weight: 300;
            line-height: 1;
        }

        .close-btn:hover {
            background: rgba(0, 0, 0, 0.55);
            transform: scale(1.06);
        }

        .counter {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 10001;
            font-weight: 400;
        }

        /* ============================================================
                   5. 返回按钮（风格统一）
                   ============================================================ */
        .back-home {
            margin-top: 3rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: #f2cdc4;
            color: #3d2c2a;
            padding: 0.75rem 2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.25s ease, transform 0.2s ease;
            box-shadow: 0 4px 12px rgba(242, 205, 196, 0.3);
            border: none;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        .back-home:hover {
            background: #e8bcb2;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(242, 205, 196, 0.4);
        }

        /* ============================================================
                   6. 响应式
                   ============================================================ */
        @media (max-width: 640px) {
            body {
                padding: 1.2rem 0.8rem 2rem;
            }

            .gallery-header h1 {
                font-size: 1.9rem;
            }

            .gallery-header .subtitle {
                font-size: 0.95rem;
            }

            .gallery-header .hint {
                font-size: 0.8rem;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 0.8rem;
            }

            .grid-item {
                border-radius: 14px;
                aspect-ratio: 4 / 5;
            }

            .nav-btn {
                width: 44px;
                height: 44px;
                font-size: 1.4rem;
            }

            .nav-btn.prev {
                left: 0.6rem;
            }
            .nav-btn.next {
                right: 0.6rem;
            }

            .close-btn {
                top: 1rem;
                right: 1rem;
                width: 44px;
                height: 44px;
                font-size: 1.5rem;
            }

            .counter {
                bottom: 1.5rem;
                font-size: 0.8rem;
                padding: 0.3rem 1rem;
            }

            .back-home {
                padding: 0.6rem 1.5rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 400px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 0.6rem;
            }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>

<body>

    <div class="gallery-wrapper">

        <!-- ===== 标题区（已更新） ===== -->
        <header class="gallery-header">
            <h1>Daisy’s Photo Gallery</h1>
            <p class="subtitle">黛溪的海报墙 <span class="heart">❤️</span></p>
            <p class="hint">点击任意照片放大 · 左右滑动浏览</p>
        </header>

        <!-- ===== 图片网格 ===== -->
        <div class="grid" id="photoGrid">
            <!-- 由 JavaScript 动态生成 -->
        </div>

        <!-- ===== 返回按钮 ===== -->
        <div style="display: flex; justify-content: center; width: 100%;">
            <a href="zdx-role-test.ycxazzo.top" target="_blank" class="back-home">
                ← 回到人格测试
            </a>
        </div>
    </div>

    <!-- ============================================================
    LIGHTBOX
    ============================================================ -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="图片放大浏览">
        <button class="close-btn" id="closeBtn" aria-label="关闭浏览">✕</button>
        <button class="nav-btn prev" id="prevBtn" aria-label="上一张">‹</button>
        <button class="nav-btn next" id="nextBtn" aria-label="下一张">›</button>
        <div class="lightbox-image-wrap" id="lightboxImageWrap">
            <img id="lightboxImg" src="" alt="放大图片" />
        </div>
        <div class="counter" id="counter">1 / 1</div>
    </div>

    <!-- ============================================================
    JavaScript
    ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================================
            // 1. 图片数据（请替换为实际文件名）
            // ============================================================
            const IMAGES = [
                { src: 'images/photo-01.jpg', alt: '黛溪 · 光影一' },
                { src: 'images/photo-02.jpg', alt: '黛溪 · 光影二' },
                { src: 'images/photo-03.jpg', alt: '黛溪 · 光影三' },
                { src: 'images/photo-04.jpg', alt: '黛溪 · 光影四' },
                { src: 'images/photo-05.jpg', alt: '黛溪 · 光影五' },
                { src: 'images/photo-06.jpg', alt: '黛溪 · 光影六' },
                { src: 'images/photo-07.jpg', alt: '黛溪 · 光影七' },
                { src: 'images/photo-08.jpg', alt: '黛溪 · 光影八' },
                { src: 'images/photo-09.jpg', alt: '黛溪 · 光影九' },
                { src: 'images/photo-10.jpg', alt: '黛溪 · 光影十' },
            ];

            // ============================================================
            // 2. DOM 引用
            // ============================================================
            const grid = document.getElementById('photoGrid');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const closeBtn = document.getElementById('closeBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const counter = document.getElementById('counter');

            let currentIndex = 0;

            // ============================================================
            // 3. 渲染网格
            // ============================================================
            function renderGrid() {
                grid.innerHTML = '';
                IMAGES.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'grid-item';
                    div.setAttribute('role', 'button');
                    div.setAttribute('tabindex', '0');
                    div.setAttribute('aria-label', `查看图片 ${index + 1}: ${item.alt}`);

                    const img = document.createElement('img');
                    img.src = item.src;
                    img.alt = item.alt;
                    img.loading = 'lazy';

                    div.appendChild(img);

                    div.addEventListener('click', function(e) {
                        e.stopPropagation();
                        openLightbox(index);
                    });

                    div.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            openLightbox(index);
                        }
                    });

                    grid.appendChild(div);
                });
            }

            // ============================================================
            // 4. Lightbox 控制
            // ============================================================
            function openLightbox(index) {
                if (!IMAGES.length) return;
                currentIndex = Math.max(0, Math.min(index, IMAGES.length - 1));
                updateLightboxImage();
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
                lightboxImg.focus();
            }

            function closeLightbox() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            }

            function goPrev() {
                if (IMAGES.length <= 1) return;
                currentIndex = (currentIndex - 1 + IMAGES.length) % IMAGES.length;
                updateLightboxImage();
            }

            function goNext() {
                if (IMAGES.length <= 1) return;
                currentIndex = (currentIndex + 1) % IMAGES.length;
                updateLightboxImage();
            }

            function updateLightboxImage() {
                const item = IMAGES[currentIndex];
                if (!item) return;
                lightboxImg.src = item.src;
                lightboxImg.alt = item.alt;
                counter.textContent = `${currentIndex + 1} / ${IMAGES.length}`;
                lightbox.setAttribute('aria-label', `图片 ${currentIndex + 1}: ${item.alt}`);
            }

            // ============================================================
            // 5. 键盘事件
            // ============================================================
            document.addEventListener('keydown', function(e) {
                if (!lightbox.classList.contains('active')) return;
                switch (e.key) {
                    case 'Escape':
                        closeLightbox();
                        e.preventDefault();
                        break;
                    case 'ArrowLeft':
                        goPrev();
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                        goNext();
                        e.preventDefault();
                        break;
                }
            });

            // ============================================================
            // 6. UI 事件绑定
            // ============================================================
            closeBtn.addEventListener('click', closeLightbox);
            prevBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                goPrev();
            });
            nextBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                goNext();
            });

            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox || e.target === document.getElementById('lightboxImageWrap')) {
                    closeLightbox();
                }
            });

            lightboxImg.addEventListener('click', function(e) {
                e.stopPropagation();
            });

            // ============================================================
            // 7. 触摸滑动
            // ============================================================
            let touchStartX = 0;
            let touchEndX = 0;

            lightbox.addEventListener('touchstart', function(e) {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            lightbox.addEventListener('touchend', function(e) {
                touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 40) {
                    if (diff > 0) {
                        goNext();
                    } else {
                        goPrev();
                    }
                }
            }, { passive: true });

            // ============================================================
            // 8. 初始化
            // ============================================================
            renderGrid();

            if (!IMAGES.length) {
                grid.innerHTML =
                    '<p style="grid-column:1/-1; text-align:center; color:#8a7773; padding:3rem 0;">暂无照片，请添加图片。</p>';
            }

            console.log('📸 Daisy’s Photo Gallery 已加载，图片数量:', IMAGES.length);
        })();
    </script>

</body>
</html>
